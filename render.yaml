# Render.com deployment config  (https://render.com)
# Deploy: connect your GitHub repo to Render and it picks this file up automatically.

services:
  - type: web
    name: pcap-video-extractor
    env: docker
    plan: standard            # standard plan needed for GStreamer CPU workloads
    dockerfilePath: ./Dockerfile
    dockerContext:  .
    envVars:
      - key: MAX_UPLOAD_MB
        value: "500"
      - key: FILE_TTL_HOURS
        value: "2"
    disk:
      name: pcap-storage
      mountPath: /app/uploads
      sizeGB: 10
    healthCheckPath: /api/health
