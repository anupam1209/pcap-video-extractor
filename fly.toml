# Fly.io deployment config  (https://fly.io)
# Deploy: fly launch  (then: fly deploy on updates)

app            = "pcap-video-extractor"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  MAX_UPLOAD_MB  = "500"
  FILE_TTL_HOURS = "2"
  PORT           = "8000"

[http_service]
  internal_port       = 8000
  force_https         = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 5
    hard_limit = 10

[[vm]]
  memory = "2gb"
  cpus   = 2

[[mounts]]
  source      = "pcap_storage"
  destination = "/app/uploads"
  initial_size = "10gb"
